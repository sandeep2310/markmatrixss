<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sales enquiry contact form with validation." />
    <title>Matrix Sales Solutions | Contact Us</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Home">
			<img src="assets/companyLogo.png" alt="Company Logo" class="site-logo" />
			<span>MARK MATRIX SECURITY SOLUTIONS</span>
</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="site-nav" class="site-nav" aria-label="Main navigation">
        <a href="index.html" >Home</a>
        <a href="products.html">Products</a>
        <a href="clients.html">Pet Clients</a>
        <a href="about.html">About Us</a>
        <a href="contact.html" aria-current="page">Contact</a>
		<a href="director.html">Director</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Contact Us</p>
        <h1>Send a Sales or Service Enquiry.</h1>
		<p><strong>or
		<br>
		Why to Wait... 
		<br>
		Contact Now @: +91-8168945190, 8287552471 / Email: markmartix0907@gmail.com</strong>
           </p>
      </section>

      <section class="section contact-layout">
        <form
          id="enquiryForm"
          class="enquiry-form"
          action="https://api.web3forms.com/submit"
          method="POST"
        >
          <input type="hidden" name="access_key" value="sampleKeyToUpdate" />
		  <input type="hidden" name="subject" value="New sales enquiry from TestCompany website" />
          <input type="hidden" name="from_name" value="TestCompany Website" />
          <input type="checkbox" name="botcheck" class="hidden" style="display: none" tabindex="-1" autocomplete="off" />

          <div class="form-row">
            <label for="name">Name <span>*</span></label>
            <input id="name" name="name" type="text" autocomplete="name" required />
            <small class="error-message" data-error-for="name"></small>
          </div>
		  <div class="form-row">
			<label for="email">Email <span>*</span></label>
			<input id="email" name="email" type="email" autocomplete="email" required />
			<small class="error-message" data-error-for="email"></small>
		  </div>

          <div class="form-row">
            <label for="mobile">Mobile/Contact Number <span>*</span></label>
            <input id="mobile" name="mobile" type="tel" autocomplete="tel" required />
            <small class="error-message" data-error-for="mobile"></small>
          </div>

          <div class="form-row">
            <label for="purpose">Enquiry Purpose</label>
            <select id="purpose" name="purpose">
              <option value="Product Information">Product Information</option>
              <option value="Price Quotation">Price Quotation</option>
              <option value="Demo Request">Demo Request</option>
              <option value="Service Support">Service Support</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-row">
            <label for="otherInfo">Any Other Information</label>
            <textarea id="otherInfo" name="otherInfo" rows="5"></textarea>
          </div>

          <button class="button primary submit-button" type="submit">Submit</button>
          <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
        </form>

        <aside class="contact-card">
          <p>
           </p>
          <div class="delivery-log" id="deliveryLog">
            <p>No enquiry submitted yet.</p>
          </div>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> MARK MATRIX SECURITY SOLUTIONS</p>
      <a href="index.html">Home</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
